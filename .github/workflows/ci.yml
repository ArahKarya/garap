name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arahkarya
          POSTGRES_PASSWORD: arahkarya
          POSTGRES_DB: arahkarya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arahkarya"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Shared build
        run: pnpm --filter @garap/shared build
      - name: Prisma generate
        run: pnpm --filter @garap/server prisma:generate
        env:
          DATABASE_URL: postgresql://arahkarya:arahkarya@localhost:5432/arahkarya_test?schema=public
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://arahkarya:arahkarya@localhost:5432/arahkarya_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: test-secret-for-ci-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-ci-minimum-32-characters-long
