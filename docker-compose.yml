name: garap

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garap}
      POSTGRES_DB: ${POSTGRES_DB:-garap_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bind hanya ke localhost host (bukan 0.0.0.0) — Postgres tak perlu diakses
      # dari LAN; app/worker tetap konek via Docker network internal.
      - '127.0.0.1:${POSTGRES_PORT:-5439}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-garap}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT_HOST:-6380}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.allinone
      args:
        VITE_API_URL: /api
        VITE_APP_NAME: "Garap"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-garap}:${POSTGRES_PASSWORD:-garap}@postgres:5432/${POSTGRES_DB:-garap_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3007
      APP_URL: ${APP_URL:-https://garap.arahkarya.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://garap.arahkarya.com}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PUBLIC_SIGNUP: ${PUBLIC_SIGNUP:-false}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Garap <no-reply@arahkarya.com>}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@garap.local}
      # Leave blank to skip local-admin seed; set to ≥12 chars to enable.
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    ports:
      - '${APP_PORT:-3007}:3007'
    volumes:
      - app_uploads:/app/uploads

  worker:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-garap}:${POSTGRES_PASSWORD:-garap}@postgres:5432/${POSTGRES_DB:-garap_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
    command: ['node', 'server/dist/worker.js']

# Volume garap_* (rebrand total 2026-07-07; volume lama panggon-mikir_* hanya
# ada di deployment RPi5 lama — migrasi manual bila data lama dibutuhkan).
volumes:
  postgres_data:
    name: garap_postgres_data
  redis_data:
    name: garap_redis_data
  app_uploads:
    name: garap_app_uploads
