services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panggonmikir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panggonmikir}
      POSTGRES_DB: ${POSTGRES_DB:-panggonmikir_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5439}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-panggonmikir}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT_HOST:-6380}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-panggonmikir}:${POSTGRES_PASSWORD:-panggonmikir}@postgres:5432/${POSTGRES_DB:-panggonmikir_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3007
      APP_URL: ${APP_URL:-https://panggonmikir.arahkarya.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://panggonmikir.arahkarya.com}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://panggonmikir.arahkarya.com/api/auth/google/callback}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@panggonmikir.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
    ports:
      - '${APP_PORT:-3007}:3007'
    volumes:
      - app_uploads:/app/uploads

  worker:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-panggonmikir}:${POSTGRES_PASSWORD:-panggonmikir}@postgres:5432/${POSTGRES_DB:-panggonmikir_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://panggonmikir.arahkarya.com/api/auth/google/callback}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
    command: ['node', 'server/dist/worker.js']

volumes:
  postgres_data:
  redis_data:
  app_uploads:
